name: Peeps

on:
  push:
    branches: ['utils/peeps-checker-ci']
  workflow_dispatch:

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - run: deno install --allow-scripts

      - env:
          PEEPS_CLIENT_ID: ${{ secrets.PEEPS_CLIENT_ID }}
          PEEPS_CLIENT_SECRET: ${{ secrets.PEEPS_CLIENT_SECRET }}
          PEEPS_REFRESH_TOKEN: ${{ secrets.PEEPS_REFRESH_TOKEN }}
          PEEPS_SPREADSHEET_ID: ${{ secrets.PEEPS_SPREADSHEET_ID }}
        run: deno run --allow-env --allow-net --allow-write utils/peeps-generate.ts

      - uses: actions/checkout@v5
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Updated peeps"
          git push
